name: Parameterized Python Runner

on:
  workflow_dispatch:   # Triggers the manual button + pop-up input form
    inputs:
      first_argument:
        description: 'Enter your first input string'
        required: true
        default: 'Hello'
      second_argument:
        description: 'Enter your second input string'
        required: false
        default: 'World'

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Common Dependencies
        run: |
          python -m pip install --upgrade pip
          # Pre-installs popular packages so "all types of code" can execute
          pip install requests pandas numpy beautifulsoup4 openpyxl

      - name: Execute Python script with Inputs
        # Pass the typed UI values directly into the execution command line string
        run: python main.py "${{ github.event.inputs.first_argument }}" "${{ github.event.inputs.second_argument }}"
