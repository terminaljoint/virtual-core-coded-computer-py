<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Console</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/lib/xterm.min.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }
        #terminal {
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="terminal"></div>

<script>
    let term;
    let pyodide;
    let currentLine = "";
    let inputResolve = null;

    // 1. Fire up the Terminal UI visually first
    function startTerminalView() {
        term = new Terminal({
            cursorBlink: true,
            fontSize: 16,
            fontFamily: '"Courier New", Courier, monospace',
            theme: { background: '#000000', foreground: '#ffffff', cursor: '#ffffff' },
            convertEol: true
        });
        term.open(document.getElementById('terminal'));
        term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m Booting terminal window layout...");
    }

    // 2. Main Logic Execution 
    async function main() {
        startTerminalView();

        try {
            // Load Python engine
            pyodide = await loadPyodide();
            term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m Core engine successfully configured.");

            // Clear cache and fetch your Python file
            const cacheBuster = new Date().getTime();
            const response = await fetch(`main.py?t=${cacheBuster}`);
            if (!response.ok) throw new Error("Could not load main.py from repository directory.");
            const pythonCode = await response.text();

            term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m main.py downloaded. Preparing IO interface...\r\n");

            // Direct standard script execution printing loops straight to the console window
            pyodide.setStdout({
                write: (buffer) => {
                    term.write(String.fromCharCode.apply(null, buffer));
                }
            });
            pyodide.setStderr({
                write: (buffer) => {
                    term.write(`\x1b[1;31m${String.fromCharCode.apply(null, buffer)}\x1b[0m`);
                }
            });

            // Map standard Python input() requests straight to the active console terminal cursor
            pyodide.setStdin({
                stdin: () => {
                    return new Promise((resolve) => {
                        inputResolve = resolve; // Pass control to keyboard input handler
                    });
                }
            });

            // Intercept data entry directly inside the active terminal environment line
            term.onData(data => {
                // If Python is waiting for an input request
                if (inputResolve) {
                    if (data === '\r') { // User pressed Enter
                        term.write('\r\n');
                        const sendData = currentLine;
                        currentLine = "";
                        const resolve = inputResolve;
                        inputResolve = null;
                        resolve(sendData); // Release Python's execution wait state
                    } 
                    else if (data === '\x7F') { // User pressed Backspace
                        if (currentLine.length > 0) {
                            currentLine = currentLine.slice(0, -1);
                            term.write('\b \b');
                        }
                    } 
                    else if (data.charCodeAt(0) >= 32 && data.charCodeAt(0) < 127) { // Printable characters
                        currentLine += data;
                        term.write(data);
                    }
                }
            });

            // Run your script inside a micro-delayed environment block to prevent browser render locks
            setTimeout(async () => {
                try {
                    await pyodide.runPythonAsync(pythonCode);
                    term.writeln("\r\n\x1b[1;34m[PROCESS COMPLETED]\x1b[0m");
                } catch (runErr) {
                    term.writeln(`\r\n\x1b[1;31m[RUNTIME ERROR]\x1b[0m\r\n${runErr.message}`);
                }
            }, 50);

        } catch (setupErr) {
            term.writeln(`\r\n\x1b[1;31m[FATAL ERROR] System initialization failure: ${setupErr.message}\x1b[0m`);
        }
    }

    main();
</script>

</body>
</html>
