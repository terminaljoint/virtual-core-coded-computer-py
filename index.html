<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Terminal Console</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/lib/xterm.min.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }
        #terminal {
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="terminal"></div>

<script type="module">
    // We import MicroPython's ultra-lightweight web assembly library
    import { loadMicroPython } from 'https://cdn.jsdelivr.net/npm/micropython-webworker@1.1.0/index.js';

    let term;
    let mp;
    let inputLineBuffer = "";
    let resolveInputSignal = null;

    // 1. Instantly print terminal layout so your screen is NEVER blank
    function createTerminalShell() {
        term = new Terminal({
            cursorBlink: true,
            fontSize: 15,
            fontFamily: '"Courier New", Courier, monospace',
            theme: { background: '#000000', foreground: '#ffffff', cursor: '#ffffff' },
            convertEol: true
        });
        term.open(document.getElementById('terminal'));
        term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m Booting ultra-lightweight terminal shell...");
    }

    // 2. Main Logic Execution Engine
    async function bootSystem() {
        createTerminalShell();

        try {
            // Find absolute path of repository folder seamlessly
            const currentHref = window.location.href;
            const baseDirectory = currentHref.substring(0, currentHref.lastIndexOf('/'));
            const cacheBuster = new Date().getTime();
            const absoluteTargetUrl = `${baseDirectory}/main.py?t=${cacheBuster}`;

            term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m Fetching main.py logic paths...");
            const response = await fetch(absoluteTargetUrl);
            if (!response.ok) throw new Error("Could not download main.py file.");
            let pythonCode = await response.text();

            term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m Initializing MicroPython backend runtime environment...");
            
            // Initialize the lightweight interpreter instance
            mp = await loadMicroPython();
            term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m Core engine online. Initializing software cycles...\r\n");

            // Direct standard stdout print chains straight to our UI rows
            mp.onStdout((text) => {
                term.write(text);
            });

            // Catch keyboard keystroke maps directly
            term.onData(data => {
                if (resolveInputSignal) {
                    if (data === '\r') { // Enter key
                        term.write('\r\n');
                        const finalData = inputLineBuffer;
                        inputLineBuffer = "";
                        const resolve = resolveInputSignal;
                        resolveInputSignal = null;
                        resolve(finalData); // Release execution suspension hooks
                    } 
                    else if (data === '\x7F') { // Backspace key
                        if (inputLineBuffer.length > 0) {
                            inputLineBuffer = inputLineBuffer.slice(0, -1);
                            term.write('\b \b');
                        }
                    } 
                    else if (data.charCodeAt(0) >= 32 && data.charCodeAt(0) < 127) {
                        inputLineBuffer += data;
                        term.write(data);
                    }
                }
            });

            // Patch Python's input standard function to listen directly to the terminal rows
            window.customInputReader = () => {
                return new Promise((resolve) => {
                    resolveInputSignal = resolve;
                });
            };

            // Inject an elegant bridge helper right into the Python scope
            await mp.runPythonAsync(`
import builtins
import js

def runtime_input(prompt_text=""):
    if prompt_text:
        print(prompt_text, end="")
    # Use JavaScript promise handlers to grab the typed line data safely
    promise = js.customInputReader()
    return promise.toString()

builtins.input = runtime_input
            `);

            // Execute the virtual computer program
            await mp.runPythonAsync(pythonCode);
            term.writeln("\r\n\x1b[1;34m[PROCESS COMPLETED]\x1b[0m");

        } catch (err) {
            term.writeln(`\r\n\x1b[1;31m[CRITICAL FAULT] ${err.message}\x1b[0m`);
        }
    }

    bootSystem();
</script>

</body>
</html>
