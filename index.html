<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Terminal Python Runner</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/lib/xterm.min.js"></script>
    
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
        }
        h2 {
            margin-bottom: 5px;
            color: #4CAF50;
        }
        p {
            color: #888;
            margin-top: 0;
            margin-bottom: 15px;
        }
        /* Linux Terminal Container styling */
        #terminal-container {
            width: 100%;
            padding: 10px;
            background-color: #000000;
            border-radius: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Linux Terminal Python Runner</h2>
    <p id="status">🔄 Initializing terminal system and pulling main.py...</p>
    
    <div id="terminal-container">
        <div id="terminal"></div>
    </div>
</div>

<script>
    let term;
    let pyodide;
    let inputResolve = null;
    let currentInputLine = "";

    // 1. Initialize the Xterm.js terminal view layout
    function initTerminal() {
        term = new Terminal({
            cursorBlink: true,
            fontSize: 15,
            fontFamily: '"Courier New", Courier, monospace',
            theme: {
                background: '#000000',
                foreground: '#ffffff',
                cursor: '#ffffff'
            }
        });
        term.open(document.getElementById('terminal'));
        term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m Initializing environment backend...");

        // Listen for user keyboard strokes inside the terminal window
        term.onData(data => {
            // Handle Enter keypress
            if (data === '\r') { 
                term.write('\r\n');
                if (inputResolve) {
                    let resolve = inputResolve;
                    inputResolve = null;
                    resolve(currentInputLine); // Send string over to Python's input() stream
                }
                currentInputLine = "";
            } 
            // Handle Backspace keypress
            else if (data === '\x7F') { 
                if (currentInputLine.length > 0) {
                    currentInputLine = currentInputLine.slice(0, -1);
                    term.write('\b \b'); // Clear character off xterm view layout
                }
            } 
            // Handle regular input characters (filtering out arrow keys/control characters)
            else if (data.charCodeAt(0) >= 32 && data.charCodeAt(0) < 127) {
                currentInputLine += data;
                term.write(data);
            }
        });
    }

    // 2. Main Logic Orchestration Loop
    async function main() {
        initTerminal();
        const statusEl = document.getElementById("status");

        try {
            // Initialize WebAssembly runtime environment
            pyodide = await loadPyodide();
            
            // Bypass asset cache filters
            const timestamp = new Date().getTime();
            const response = await fetch(`main.py?t=${timestamp}`);
            
            if (!response.ok) {
                throw new Error(`Failed to load main.py (Status: ${response.status})`);
            }
            const pythonCode = await response.text();

            statusEl.innerText = "✅ System Online: Running main.py inside terminal console layout below.";
            statusEl.style.color = "#4CAF50";
            
            term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m main.py loaded. Executing program...\r\n");

            // Direct standard print commands to Xterm console layouts
            pyodide.setStdout({
                write: (buffer) => {
                    // Normalize standard string feed formats over to xterm line break sequences
                    const text = String.fromCharCode.apply(null, buffer).replace(/\n/g, '\r\n');
                    term.write(text);
                }
            });

            pyodide.setStderr({
                write: (buffer) => {
                    const text = String.fromCharCode.apply(null, buffer).replace(/\n/g, '\r\n');
                    term.write(`\x1b[1;31m${text}\x1b[0m`); // Highlight standard error logs in Red font
                }
            });

            // Map standard inline inputs via Promises 
            pyodide.setStdin({
                stdin: () => {
                    // Creates an active waiting state until user hits Enter key in the terminal UI
                    return new Promise((resolve) => {
                        inputResolve = resolve;
                    });
                }
            });

            // Run scripts asynchronously via native execution architectures
            await pyodide.runPythonAsync(pythonCode);
            
            term.writeln("\r\n\x1b[1;34m[PROCESS COMPLETED]\x1b[0m");

        } catch (err) {
            statusEl.innerText = "❌ Initialization/Execution Error";
            statusEl.style.color = "#ff3333";
            term.writeln(`\r\n\x1b[1;31m[ERROR] ${err.message}\x1b[0m`);
        }
    }

    // Fire application launch cycle setup scripts
    main();
</script>

</body>
</html>
