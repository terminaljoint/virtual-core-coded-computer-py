<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Computer Interface</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #1e1e1e; color: #00ff00; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #2d2d2d; padding: 20px; border-radius: 8px; border: 1px solid #444; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: #00cc00; }
        #output { background: #000; padding: 15px; border-radius: 4px; min-height: 100px; white-space: pre-wrap; margin-top: 15px; border: 1px solid #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>📟 Virtual CPU Live Dashboard</h2>
    <p>This page pulls your raw <strong>main.py</strong> file from GitHub and runs it inside the browser!</p>
    <button onclick="runLivePythonCPU()">Boot & Run main.py</button>
    
    <h3>System Output:</h3>
    <div id="output">System idle. Awaiting boot...</div>
</div>

<script>
    async function runLivePythonCPU() {
        let outputDiv = document.getElementById("output");
        outputDiv.innerText = "Connecting to Python engine...";
        
        try {
            // 1. Initialize Pyodide
            let pyodide = await loadPyodide();
            outputDiv.innerText = "Fetching your live main.py file...\n";

            // 2. Fetch the text content of your main.py file
            let response = await fetch('main.py');
            if (!response.ok) {
                throw new Error("Could not find or read main.py in this folder.");
            }
            let pythonCode = await response.text();

            outputDiv.innerText += "Booting Virtual Machine and running countdown...\n\n";

            // 3. Write main.py to Pyodide's virtual local file system
            pyodide.FS.writeFile("main.py", pythonCode);

            // 4. Run a tiny control script that safely handles the IO stream AND executes the file
            let runnerScript = `
import sys
import io

# Setup the safe string buffer for printing
sys.stdout = io.StringIO()

# Execute the file as a true main module
import traceback
try:
    with open("main.py", "r") as f:
        exec(f.read(), {"__name__": "__main__"})
except Exception as e:
    print("Python Runtime Error:", traceback.format_exc())

# Extract the logs out
output_data = sys.stdout.getvalue()
output_data
`;

            // 5. Run our wrapper script and capture everything
            let stdout = await pyodide.runPythonAsync(runnerScript);

            if (stdout.trim() === "") {
                outputDiv.innerText += "The program executed, but nothing was printed.\n";
            } else {
                outputDiv.innerText += stdout + "\n";
            }
            outputDiv.innerText += "--- CPU Halted Gracefully ---";

        } catch (err) {
            outputDiv.innerText = "Execution Error: " + err;
        }
    }
</script>

</body>
</html>
