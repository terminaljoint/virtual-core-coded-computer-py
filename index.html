<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Terminal Console</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.11.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.11.1/core.js"></script>
    
    <style>
        /* Force the terminal emulator to take up the absolute entire web page */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }
        
        /* Style the built-in PyScript terminal tag to occupy 100% space */
        script[type="py"], py-script, xterm-terminal, .pyscript-terminal {
            width: 100% !important;
            height: 100% !important;
            box-sizing: border-box;
        }
        
        /* Fine-tune padding of the interior terminal window */
        .terminal {
            padding: 15px !important;
        }
    </style>
</head>
<body>

    <script type="py" terminal worker>
import sys
import asyncio
import js
from pyodide.http import pyfetch

async def boot_system():
    print("\x1b[1;32m[SYSTEM]\x1b[0m Booting terminal console engine...")
    print("\x1b[1;32m[SYSTEM]\x1b[0m Pulling main.py from repository directory...\n")
    
    try:
        # Get the absolute URL of the current page folder to fix the WorkerGlobalScope error
        import time
        from urllib.parse import urljoin
        
        base_url = js.window.location.href
        timestamp = int(time.time())
        target_url = urljoin(base_url, f"main.py?t={timestamp}")
        
        # Fetch using the absolute validated path
        response = await pyfetch(target_url)
        
        if response.status != 200:
            print(f"\x1b[1;31m[ERROR] Could not load main.py (Status: ${response.status})\x1b[0m")
            return
            
        # Save it locally in the virtual environment container
        with open("main.py", "wb") as f:
            f.write(await response.bytes())
            
        # Dynamically execute the main.py file within this clean terminal session context
        with open("main.py", "r") as f:
            exec(f.read(), globals())
            
    except Exception as e:
        print(f"\n\x1b[1;31m[CRITICAL ERROR] Execution failed: {str(e)}\x1b[0m")

# Execute the async boot loop
asyncio.ensure_future(boot_system())
    </script>

</body>
</html>
