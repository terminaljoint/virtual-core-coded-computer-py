<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Console</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.8.0/lib/addon-fit.min.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }
        #terminal {
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="terminal"></div>

<script>
    let term;
    let fitAddon;
    let pyodide;
    let currentInput = "";
    
    // Virtual Computer VM Instance State
    let vmInitialized = false;

    // 1. Initialize full-screen terminal window layouts
    function initTerminal() {
        term = new Terminal({
            cursorBlink: true,
            fontSize: 16,
            fontFamily: '"Courier New", Courier, monospace',
            theme: {
                background: '#000000',
                foreground: '#ffffff',
                cursor: '#ffffff'
            },
            convertEol: true
        });
        
        fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();
        
        term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m Initializing terminal console engine...");
    }

    // 2. Setup the Shell Orchestration Pipeline
    async function main() {
        initTerminal();

        try {
            // Fetch WebAssembly Pyodide framework packages
            pyodide = await loadPyodide();
            
            // Bypass asset cache configurations
            const timestamp = new Date().getTime();
            const response = await fetch(`main.py?t=${timestamp}`);
            
            if (!response.ok) {
                throw new Error(`Failed to locate main.py (Status: ${response.status})`);
            }
            const pythonCode = await response.text();

            term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m main.py loaded into context.");
            term.writeln("\x1b[1;34m[SYSTEM]\x1b[0m Injecting virtual machine execution loops...\r\n");

            // Redirect stdout and stderr straight into xterm terminal stream displays
            pyodide.setStdout({
                write: (buffer) => {
                    term.write(String.fromCharCode.apply(null, buffer));
                }
            });
            pyodide.setStderr({
                write: (buffer) => {
                    term.write(`\x1b[1;31m${String.fromCharCode.apply(null, buffer)}\x1b[0m`);
                }
            });

            // Compile the class structure first so JavaScript can converse directly with the VM loop
            await pyodide.runPythonAsync(pythonCode);
            
            // Start the VM engine process down inside the terminal console view
            term.writeln("=== Virtual Computer Started ===");
            term.write("Enter a number: ");
            vmInitialized = true;

            // 3. Listen to keyboard data events sequentially without thread locking
            term.onData(async (data) => {
                if (!vmInitialized) return;

                if (data === '\r') { // Enter key pressed
                    term.write('\r\n');
                    let inputVal = currentInput.trim();
                    currentInput = "";
                    
                    if (inputVal === "") inputVal = "0"; // fallback default protection

                    // Run the step cycle with our custom interactive line parameter inputs directly!
                    try {
                        await pyodide.runPythonAsync(`
# Simulate input insertion, pass it into CPU Register A, and continue execution sequences
vm.reg_A = int("${inputVal}")
vm.pc += 1

# Complete running remaining application code structures
while vm.running:
    vm.step()

print("=== Virtual Computer Halted ===")
print(f"Register A = {vm.reg_A}")
print(f"Register B = {vm.reg_B}")
print(f"Program Counter = {vm.pc}")
                        `);
                        
                        term.writeln("\r\n\x1b[1;34m[PROCESS COMPLETED]\x1b[0m");
                        vmInitialized = false; // Block execution to keep environment pristine
                    } catch (err) {
                        term.writeln(`\r\n\x1b[1;31m[RUNTIME ERROR] ${err.message}\x1b[0m`);
                    }

                } else if (data === '\x7F') { // Backspace key pressed
                    if (currentInput.length > 0) {
                        currentInput = currentInput.slice(0, -1);
                        term.write('\b \b');
                    }
                } else if (data.charCodeAt(0) >= 32 && data.charCodeAt(0) < 127) { // Regular inputs
                    currentInput += data;
                    term.write(data);
                }
            });

        } catch (err) {
            term.writeln(`\r\n\x1b[1;31m[LAUNCH FAULT] ${err.message}\x1b[0m`);
        }
    }

    // Adapt layout dimension scalings reactively
    window.addEventListener('resize', () => { if(fitAddon) fitAddon.fit(); });

    main();
</script>

</body>
</html>
