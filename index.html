<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Console</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        /* Our standalone, unblockable layout container text area */
        #console {
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #00ff00; /* Classic green terminal font output color */
            border: none;
            padding: 15px;
            box-sizing: border-box;
            font-size: 16px;
            resize: none;
            outline: none;
        }
    </style>
</head>
<body>

<textarea id="console" spellcheck="false"></textarea>

<script>
    const consoleEl = document.getElementById("console");
    let pyodide;
    let pythonScriptBody = "";
    let activeInputResolve = null;
    let lineStartCursorIndex = 0;

    // Helper utilities to handle printing behavior loops safely
    function writeToConsole(text) {
        consoleEl.value += text;
        consoleEl.scrollTop = consoleEl.scrollHeight; // Auto scroll tracking points
        lineStartCursorIndex = consoleEl.value.length;
    }

    async function startSystemEngine() {
        writeToConsole("[SYSTEM] Booting console screen engine...\n");
        
        try {
            // Find absolute file repository layouts safely
            const currentHref = window.location.href;
            const baseDirectory = currentHref.substring(0, currentHref.lastIndexOf('/'));
            const cacheBuster = new Date().getTime();
            const targetFileUrl = `${baseDirectory}/main.py?t=${cacheBuster}`;

            writeToConsole("[SYSTEM] Downloading software package components...\n");
            const response = await fetch(targetFileUrl);
            if (!response.ok) throw new Error(`Could not reach main.py file (Status: ${response.status})`);
            pythonScriptBody = await response.text();

            writeToConsole("[SYSTEM] Initializing base interpreter layer parameters...\n");
            pyodide = await loadPyodide();
            
            writeToConsole("[SYSTEM] Intersecting stream interfaces. Running program payload...\n\n");

            // Attach standard logging methods straight onto our input/output console viewport
            pyodide.setStdout({
                write: (buffer) => {
                    const text = String.fromCharCode.apply(null, buffer);
                    writeToConsole(text);
                }
            });

            pyodide.setStderr({
                write: (buffer) => {
                    const text = String.fromCharCode.apply(null, buffer);
                    writeToConsole("\n[ERROR]: " + text);
                }
            });

            // Map runtime input pause blocks down onto the textarea console interaction handler loops
            pyodide.setStdin({
                stdin: () => {
                    return new Promise((resolve) => {
                        activeInputResolve = resolve;
                    });
                }
            });

            // Monitor keyboard keystrokes natively inside the text element 
            consoleEl.addEventListener("keydown", function(e) {
                // Lock keyboard control access strictly to active row blocks
                if (consoleEl.selectionStart < lineStartCursorIndex) {
                    consoleEl.setSelectionRange(lineStartCursorIndex, lineStartCursorIndex);
                }

                if (e.key === "Enter") {
                    e.preventDefault();
                    if (activeInputResolve) {
                        const wholeText = consoleEl.value;
                        const userEnteredText = wholeText.substring(lineStartCursorIndex);
                        
                        writeToConsole("\n");
                        const resolve = activeInputResolve;
                        activeInputResolve = null;
                        resolve(userEnteredText); // Hand inputs back down to the internal compiler
                    }
                } 
                else if (e.key === "Backspace") {
                    // Prevent users from deleting printed status system line frames
                    if (consoleEl.selectionStart <= lineStartCursorIndex) {
                        e.preventDefault();
                    }
                }
            });

            // Fire up script execution asynchronously
            setTimeout(async () => {
                try {
                    await pyodide.runPythonAsync(pythonScriptBody);
                    writeToConsole("\n[PROCESS COMPLETED]");
                } catch (runErr) {
                    writeToConsole("\n[RUNTIME FAULT]:\n" + runErr.message);
                }
            }, 50);

        } catch (setupErr) {
            writeToConsole("\n[FATAL SYSTEM ABORT]: " + setupErr.message);
        }
    }

    startSystemEngine();
</script>

</body>
</html>
