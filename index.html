<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Python Runner</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        textarea {
            width: 100%;
            height: 250px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            background-color: #fff;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #2ea44f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 4px;
            white-space: pre-wrap;
            min-height: 80px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .status {
            font-weight: bold;
            color: #555;
            padding: 8px;
            background-color: #e2e3e5;
            border-radius: 4px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GitHub Pages Auto-Python Executor</h2>
    <p class="status" id="status">🔄 Setting up environment and fetching main.py...</p>
    
    <p><strong>Code from main.py:</strong></p>
    <textarea id="code" disabled>Loading code from repository...</textarea>
    
    <br>
    <button id="run-btn" onclick="runPython()" disabled>Run Code Again</button>

    <h3>Console Output:</h3>
    <div id="output">Preparing Pyodide environment...</div>
</div>

<script>
    let pyodide;

    async function init() {
        const statusEl = document.getElementById("status");
        const outputEl = document.getElementById("output");
        const codeEl = document.getElementById("code");
        const btnEl = document.getElementById("run-btn");

        try {
            // 1. Initialize Pyodide WASM environment
            pyodide = await loadPyodide();
            
            // 2. Fetch main.py with a timestamp parameter to bypass GitHub caching
            const timestamp = new Date().getTime();
            const response = await fetch(`main.py?t=${timestamp}`);
            
            if (!response.ok) {
                throw new Error(`Could not fetch main.py (Status: ${response.status}). Make sure main.py exists in the same folder.`);
            }
            const pythonCode = await response.text();

            // 3. Inject code into UI and enable elements
            codeEl.value = pythonCode;
            statusEl.innerText = "✅ Ready: Environment loaded and main.py fetched!";
            statusEl.style.backgroundColor = "#d4edda";
            statusEl.style.color = "#155724";
            codeEl.disabled = false;
            btnEl.disabled = false;
            
            // 4. Automatically run the fetched script immediately
            runPython();

        } catch (err) {
            statusEl.innerText = "❌ Initialization Error";
            statusEl.style.backgroundColor = "#f8d7da";
            statusEl.style.color = "#721c24";
            outputEl.innerText = err.message;
        }
    }
    
    // Kick off the script asset loader on page load
    init();

    async function runPython() {
        if (!pyodide) return;

        const code = document.getElementById("code").value;
        const outputDiv = document.getElementById("output");
        outputDiv.innerText = "Running script...";

        // Set up streams to intercept standard output and error messages
        pyodide.runPython(`
            import sys
            import io
            sys.stdout = io.StringIO()
            sys.stderr = io.StringIO()
        `);

        try {
            // Run code asynchronously
            await pyodide.runPythonAsync(code);
            
            // Pull the contents out of the intercepted strings
            let stdout = pyodide.runPython("sys.stdout.getvalue()");
            let stderr = pyodide.runPython("sys.stderr.getvalue()");

            if (stderr) {
                outputDiv.innerText = stdout + "\n[Runtime Error]:\n" + stderr;
            } else {
                outputDiv.innerText = stdout || "Code ran completely with zero console outputs.";
            }
        } catch (err) {
            outputDiv.innerText = "Compilation/Execution Error:\n" + err;
        }
    }
</script>

</body>
</html>
