<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Console</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        /* Standalone Terminal Textarea */
        #console {
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #00ff00; /* Linux green console text */
            border: none;
            padding: 15px;
            box-sizing: border-box;
            font-size: 16px;
            resize: none;
            outline: none;
        }
    </style>
</head>
<body>

<textarea id="console" spellcheck="false"></textarea>

<script>
    const consoleEl = document.getElementById("console");
    let pyodide;
    let pythonScriptBody = "";
    let activeInputResolve = null;
    let lineStartCursorIndex = 0;

    function writeToConsole(text) {
        consoleEl.value += text;
        consoleEl.scrollTop = consoleEl.scrollHeight;
        lineStartCursorIndex = consoleEl.value.length;
    }

    async function startSystemEngine() {
        writeToConsole("[SYSTEM] Booting terminal console engine...\n");
        
        try {
            // Fetch clean absolute main.py path
            const currentHref = window.location.href;
            const baseDirectory = currentHref.substring(0, currentHref.lastIndexOf('/'));
            const cacheBuster = new Date().getTime();
            const targetFileUrl = `${baseDirectory}/main.py?t=${cacheBuster}`;

            writeToConsole("[SYSTEM] Downloading main.py asset components...\n");
            const response = await fetch(targetFileUrl);
            if (!response.ok) throw new Error(`Could not reach main.py file.`);
            pythonScriptBody = await response.text();

            writeToConsole("[SYSTEM] Initializing base interpreter environment...\n");
            pyodide = await loadPyodide();
            
            writeToConsole("[SYSTEM] Stream bridges online. Executing logic codes...\n\n");

            // Redirect Python outputs directly to our green console layout
            pyodide.setStdout({
                write: (buffer) => {
                    const text = String.fromCharCode.apply(null, buffer);
                    writeToConsole(text);
                }
            });

            pyodide.setStderr({
                write: (buffer) => {
                    const text = String.fromCharCode.apply(null, buffer);
                    writeToConsole("\n[ERROR]: " + text);
                }
            });

            // INTERCEPT INPUT BEFORE RUNNING: Patch Python scope directly inside HTML
            pyodide.runPython(`
                import builtins
                import js

                def HTML_Inline_Input(prompt_text=""):
                    if prompt_text:
                        print(prompt_text, end="")
                    # Request data stream directly via JS promise resolution loops
                    return js.getTerminalInput()

                builtins.input = HTML_Inline_Input
            `);

            // Expose the input reader globally so Python code blocks can use it asynchronously
            window.getTerminalInput = () => {
                return new Promise((resolve) => {
                    activeInputResolve = resolve;
                });
            };

            // Monitor keystrokes inside the terminal window
            consoleEl.addEventListener("keydown", function(e) {
                // Keep the cursor locked to the active line boundary
                if (consoleEl.selectionStart < lineStartCursorIndex) {
                    consoleEl.setSelectionRange(lineStartCursorIndex, lineStartCursorIndex);
                }

                if (e.key === "Enter") {
                    e.preventDefault();
                    if (activeInputResolve) {
                        const wholeText = consoleEl.value;
                        const userEnteredText = wholeText.substring(lineStartCursorIndex);
                        
                        writeToConsole("\n");
                        const resolve = activeInputResolve;
                        activeInputResolve = null;
                        resolve(userEnteredText); // Resume Python execution seamlessly
                    }
                } 
                else if (e.key === "Backspace") {
                    // Prevent deleting terminal output logs
                    if (consoleEl.selectionStart <= lineStartCursorIndex) {
                        e.preventDefault();
                    }
                }
            });

            // Execute code with a tiny layout rendering delay
            setTimeout(async () => {
                try {
                    await pyodide.runPythonAsync(pythonScriptBody);
                    writeToConsole("\n[PROCESS COMPLETED]");
                } catch (runErr) {
                    writeToConsole("\n[RUNTIME FAULT]:\n" + runErr.message);
                }
            }, 50);

        } catch (setupErr) {
            writeToConsole("\n[FATAL SYSTEM ABORT]: " + setupErr.message);
        }
    }

    startSystemEngine();
</script>

</body>
</html>
