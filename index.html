<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Terminal Console</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.11.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.11.1/core.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }
        script[type="py"], py-script, xterm-terminal, .pyscript-terminal {
            width: 100% !important;
            height: 100% !important;
            box-sizing: border-box;
        }
        .terminal {
            padding: 15px !important;
        }
    </style>
</head>
<body>

    <script type="py" id="runner" terminal worker>
import sys
import asyncio
from pyodide.http import pyfetch
import time
import js

async def boot_system():
    print("\x1b[1;32m[SYSTEM]\x1b[0m Booting terminal console engine...")
    print("\x1b[1;32m[SYSTEM]\x1b[0m Pulling main.py from repository directory...\n")
    
    try:
        # Read the custom data-url attribute we set using JavaScript below
        script_element = js.document.getElementById("runner")
        base_dir = script_element.getAttribute("data-url")
        
        timestamp = int(time.time())
        target_url = f"{base_dir}/main.py?t={timestamp}"
        
        # Fetch directly using the perfect string
        response = await pyfetch(target_url)
        
        if response.status != 200:
            print(f"\x1b[1;31m[ERROR] Could not load main.py (Status: {response.status})\x1b[0m")
            return
            
        # Write bytes safely to internal storage
        with open("main.py", "wb") as f:
            f.write(await response.bytes())
            
        # Execute the python script
        with open("main.py", "r") as f:
            exec(f.read(), globals())
            
    except Exception as e:
        print(f"\n\x1b[1;31m[CRITICAL ERROR] Execution failed: {str(e)}\x1b[0m")

# Execute the background loop
asyncio.ensure_future(boot_system())
    </script>

    <script>
        // Main thread JavaScript figures out the clean path safely
        const currentHref = window.location.href;
        const cleanPath = currentHref.substring(0, currentHref.lastIndexOf('/'));
        
        // Inject the clean path straight into the PyScript tag attributes
        document.getElementById("runner").setAttribute("data-url", cleanPath);
    </script>

</body>
</html>
