<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Console</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/lib/xterm.min.js"></script>
    
    <style>
        /* Force the terminal window to occupy the absolute entire viewport */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }
        #terminal {
            width: 100%;
            height: 100%;
            padding: 10px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="terminal"></div>

<script>
    let term;
    let pyodide;
    let currentInputLine = "";
    let inputResolve = null;

    // 1. Initialize Xterm view across 100% viewport dimensions
    function initTerminalUI() {
        term = new Terminal({
            cursorBlink: true,
            fontSize: 16,
            fontFamily: '"Courier New", Courier, monospace',
            theme: {
                background: '#000000',
                foreground: '#ffffff',
                cursor: '#ffffff'
            },
            convertEol: true // Automatically handle line breaks mapping properly
        });
        term.open(document.getElementById('terminal'));
        term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m Initializing terminal console engine...");
    }

    // 2. Main Logic Execution Flow 
    async function main() {
        initTerminalUI();

        try {
            // Fetch WebAssembly framework backend
            pyodide = await loadPyodide();
            
            // Bypass GitHub's content delivery caching networks
            const timestamp = new Date().getTime();
            const response = await fetch(`main.py?t=${timestamp}`);
            
            if (!response.ok) {
                throw new Error(`Failed to read main.py file (Status: ${response.status})`);
            }
            const pythonCode = await response.text();

            term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m main.py loaded. Running execution runtime...\r\n");

            // Direct Python standard output print buffers directly onto xterm frames
            pyodide.setStdout({
                write: (buffer) => {
                    const text = String.fromCharCode.apply(null, buffer);
                    term.write(text);
                }
            });

            pyodide.setStderr({
                write: (buffer) => {
                    const text = String.fromCharCode.apply(null, buffer);
                    term.write(`\x1b[1;31m${text}\x1b[0m`); // Highlight compilation faults in Red
                }
            });

            // Handle typing key-mapping capture streams
            term.onData(data => {
                if (inputResolve) {
                    // Check for Enter keypress
                    if (data === '\r') {
                        term.write('\r\n');
                        const resolve = inputResolve;
                        inputResolve = null;
                        resolve(currentInputLine);
                        currentInputLine = "";
                    } 
                    // Check for Backspace keypress
                    else if (data === '\x7F') {
                        if (currentInputLine.length > 0) {
                            currentInputLine = currentInputLine.slice(0, -1);
                            term.write('\b \b');
                        }
                    } 
                    // Record regular alphanumeric print characters
                    else if (data.charCodeAt(0) >= 32 && data.charCodeAt(0) < 127) {
                        currentInputLine += data;
                        term.write(data);
                    }
                }
            });

            // Map synchronous direct text input requests safely via JavaScript proxies
            pyodide.setStdin({
                stdin: () => {
                    return new Promise((resolve) => {
                        inputResolve = resolve;
                    });
                }
            });

            // Execute Python payload logic asynchronously
            await pyodide.runPythonAsync(pythonCode);
            
            term.writeln("\r\n\x1b[1;34m[PROCESS COMPLETED]\x1b[0m");

        } catch (err) {
            term.writeln(`\r\n\x1b[1;31m[CRITICAL ERROR] ${err.message}\x1b[0m`);
        }
    }

    // Initialize execution system engine
    main();
</script>

</body>
</html>
