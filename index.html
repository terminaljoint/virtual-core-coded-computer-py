<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Terminal Console</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/css/xterm.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/lib/xterm.min.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }
        #terminal {
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="terminal"></div>

<script>
    let term;
    let pyodide;
    let currentLineData = "";
    let inputPromiseResolver = null;

    // 1. Instantly draw the Terminal window on screen so it is never blank
    function createTerminalShell() {
        term = new Terminal({
            cursorBlink: true,
            fontSize: 16,
            fontFamily: '"Courier New", Courier, monospace',
            theme: { background: '#000000', foreground: '#ffffff', cursor: '#ffffff' },
            convertEol: true
        });
        term.open(document.getElementById('terminal'));
        term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m Booting terminal console engine...");
    }

    // 2. Main execution architecture loop
    async function bootSystem() {
        createTerminalShell();

        try {
            // Load the core Pyodide environment safely
            pyodide = await loadPyodide();
            term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m Core engine successfully configured.");

            // Calculate the absolute path safely right here on the main JavaScript thread
            const currentHref = window.location.href;
            const baseDirectory = currentHref.substring(0, currentHref.lastIndexOf('/'));
            const cacheBuster = new Date().getTime();
            const absoluteTargetUrl = `${baseDirectory}/main.py?t=${cacheBuster}`;

            term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m Pulling main.py from repository directory...");

            // Fetch the code
            const response = await fetch(absoluteTargetUrl);
            if (!response.ok) throw new Error(`Could not access main.py (Status: ${response.status})`);
            const pythonCode = await response.text();

            term.writeln("\x1b[1;32m[SYSTEM]\x1b[0m main.py downloaded. Running runtime environment...\r\n");

            // Capture standard print outputs directly to Xterm lines
            pyodide.setStdout({
                write: (buffer) => {
                    term.write(String.fromCharCode.apply(null, buffer));
                }
            });
            pyodide.setStderr({
                write: (buffer) => {
                    term.write(`\x1b[1;31m${String.fromCharCode.apply(null, buffer)}\x1b[0m`);
                }
            });

            // Map Python's native input() calls directly to our keyboard tracking systems
            pyodide.setStdin({
                stdin: () => {
                    return new Promise((resolve) => {
                        inputPromiseResolver = resolve; // Pause python until user presses Enter
                    });
                }
            });

            // Handle typing key inputs inside the active line context
            term.onData(data => {
                if (inputPromiseResolver) {
                    if (data === '\r') { // Enter key pressed
                        term.write('\r\n');
                        const submittedData = currentLineData;
                        currentLineData = "";
                        const resolve = inputPromiseResolver;
                        inputPromiseResolver = null;
                        resolve(submittedData); // Hand line data over to Python's input() check
                    } 
                    else if (data === '\x7F') { // Backspace key pressed
                        if (currentLineData.length > 0) {
                            currentLineData = currentLineData.slice(0, -1);
                            term.write('\b \b');
                        }
                    } 
                    else if (data.charCodeAt(0) >= 32 && data.charCodeAt(0) < 127) { // Standard characters
                        currentLineData += data;
                        term.write(data);
                    }
                }
            });

            // Execute the code asynchronously using a non-blocking timeout strategy
            setTimeout(async () => {
                try {
                    await pyodide.runPythonAsync(pythonCode);
                    term.writeln("\r\n\x1b[1;34m[PROCESS COMPLETED]\x1b[0m");
                } catch (runErr) {
                    term.writeln(`\r\n\x1b[1;31m[RUNTIME ERROR]\x1b[0m\r\n${runErr.message}`);
                }
            }, 100);

        } catch (setupErr) {
            term.writeln(`\r\n\x1b[1;31m[FATAL ERROR] Initialization failure: ${setupErr.message}\x1b[0m`);
        }
    }

    bootSystem();
</script>

</body>
</html>
