<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Browser Python Runner</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        textarea {
            width: 100%;
            height: 200px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            border-radius: 4px;
            white-space: pre-wrap;
            min-height: 50px;
        }
        .status {
            font-weight: bold;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>In-Browser Python Executor</h2>
    <p class="status" id="status">Loading Pyodide runtime environment (please wait)...</p>
    
    <textarea id="code" disabled># Write your Python code here
def greet(name):
    return f"Hello, {name}!"

print(greet("World"))

for i in range(5):
    print(f"Line {i+1}")
</textarea>
    
    <br>
    <button id="run-btn" onclick="runPython()" disabled>Run Code</button>

    <h3>Output:</h3>
    <div id="output">Initialize the environment first...</div>
</div>

<script>
    let pyodide;

    // Initialize Pyodide
    async function main() {
        try {
            pyodide = await loadPyodide();
            document.getElementById("status").innerText = "Pyodide Environment Ready!";
            document.getElementById("status").style.color = "green";
            document.getElementById("code").disabled = false;
            document.getElementById("run-btn").disabled = false;
            document.getElementById("output").innerText = "Ready to run code.";
        } catch (err) {
            document.getElementById("status").innerText = "Failed to load Pyodide.";
            document.getElementById("status").style.color = "red";
            document.getElementById("output").innerText = err;
        }
    }
    
    main();

    // Function to run the Python code
    async function runPython() {
        if (!pyodide) return;

        const code = document.getElementById("code").value;
        const outputDiv = document.getElementById("output");
        outputDiv.innerText = "Running...";

        // Redirect standard output (print statements) to our HTML element
        pyodide.runPython(`
            import sys
            import io
            sys.stdout = io.StringIO()
            sys.stderr = io.StringIO()
        `);

        try {
            // Execute user code
            await pyodide.runPythonAsync(code);
            
            // Capture stdout/stderr
            let stdout = pyodide.runPython("sys.stdout.getvalue()");
            let stderr = pyodide.runPython("sys.stderr.getvalue()");

            if (stderr) {
                outputDiv.innerText = stdout + "\nError:\n" + stderr;
            } else {
                outputDiv.innerText = stdout || "Code executed successfully with no output.";
            }
        } catch (err) {
            outputDiv.innerText = "Execution Error:\n" + err;
        }
    }
</script>

</body>
</html>
